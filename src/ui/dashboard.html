<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL GRC || COMMAND CENTER</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-main: #00ff00;
            --accent-cyan: #00e5ff;
            --accent-purple: #bf00ff;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "Courier New", Courier, monospace;
            margin: 0;
            padding: 30px;
            overflow-x: hidden;
        }
        h1 {
            color: var(--accent-cyan);
            border-bottom: 1px solid var(--text-main);
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        .panel {
            border: 1px solid var(--accent-purple);
            padding: 20px;
            background: rgba(191, 0, 255, 0.03);
            box-shadow: inset 0 0 15px rgba(191, 0, 255, 0.05);
        }
        .panel-header {
            font-weight: bold;
            color: var(--accent-cyan);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .log-stream {
            height: 400px;
            overflow-y: auto;
            background: #000;
            border: 1px solid #333;
            padding: 15px;
            font-size: 0.9em;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            background: var(--text-main);
            color: #000;
            font-weight: bold;
        }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; border-left: 1px solid #333; }
        ::-webkit-scrollbar-thumb { background: var(--text-main); }
    </style>
</head>
<body>
    <h1>> SENTINEL_V2::COMMAND_CENTER <span class="blink">_</span></h1>
    <div style="margin-bottom: 20px; font-size: 0.9em;">
        STATUS: <span class="status-badge" id="ws-status">CONNECTING...</span> | ARCHITECTURE: EVENT-DRIVEN XAI | ENGINE: LLAMA-3 SOVEREIGN
    </div>
    
    <div class="dashboard-grid">
        <div class="panel">
            <div class="panel-header">// EVENT STREAM :: COMPLIANCE GRAPH</div>
            <div class="log-stream" id="audit-logs"></div>
        </div>
        <div class="panel" style="border-color: var(--accent-cyan); background: rgba(0, 229, 255, 0.03);">
            <div class="panel-header" style="color: var(--text-main);">// AUTONOMOUS REMEDIATION</div>
            <div class="log-stream" id="remediation-logs" style="border-color: var(--accent-cyan); color: var(--accent-cyan);"></div>
        </div>
    </div>

    <script>
        const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        const ws = new WebSocket(wsProtocol + "//" + window.location.host + "/ws/logs");
        
        ws.onopen = function() {
            document.getElementById("ws-status").innerText = "LIVE SYNC";
            document.getElementById("audit-logs").innerHTML += "[SYSTEM] WebSocket securely connected to gateway.<br>";
        };
        
        ws.onclose = function() {
            document.getElementById("ws-status").innerText = "DISCONNECTED";
            document.getElementById("ws-status").style.background = "#ff0000";
        };

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            const targetId = data.source === 'remediation' ? 'remediation-logs' : 'audit-logs';
            const target = document.getElementById(targetId);
            
            // Format output slightly for better TUI look
            const formattedMessage = data.message.replace(/\n/g, '<br>');
            target.innerHTML += formattedMessage + "<br>";
            target.scrollTop = target.scrollHeight;
        };
    </script>
</body>
</html>
